<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamber Files Portal - Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* ১. ব্লিঙ্কিং লোগো এবং সার্কেল অ্যানিমেশন সেকশন */
        #loadingSection {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .logo-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-wrapper img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            z-index: 5;
        }

        .circle-pulse {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,150,94,0.8) 0%, rgba(46,81,155,0.8) 100%);
            z-index: 1;
            animation: rippleBlink 2s infinite ease-in-out;
        }

        .circle-pulse-delayed {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,150,94,0.6) 0%, rgba(46,81,155,0.6) 100%);
            z-index: 1;
            animation: rippleBlink 2s infinite ease-in-out;
            animation-delay: 1s;
        }
        
        @keyframes rippleBlink {
            0% { transform: scale(0.9); opacity: 0.3; box-shadow: 0 0 0 0 rgba(0, 150, 94, 0.4), 0 0 0 0 rgba(46, 81, 155, 0.4); }
            50% { opacity: 0.9; box-shadow: 0 0 25px 12px rgba(0, 150, 94, 0.6), 0 0 25px 12px rgba(46, 81, 155, 0.6); }
            100% { transform: scale(1.6); opacity: 0; box-shadow: 0 0 40px 25px rgba(0, 150, 94, 0), 0 0 40px 25px rgba(46, 81, 155, 0); }
        }

        /* ২. ইন্টারস্টেশিয়াল পপ-আপ */
        #interstitialPopup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 26, 26, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .wait-box {
            background: #ffffff;
            padding: 30px 45px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .blue-spinner {
            width: 38px;
            height: 38px;
            border: 4px solid #e1f5fe;
            border-top: 4px solid #42a5f5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .wait-text { color: #34495e; font-size: 19px; font-weight: 600; }

        /* ৩. মূল ওয়েবসাইট ইন্টারফেস */
        #mainPortal {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #525659;
        }

        .top-gradient-bar {
            background: linear-gradient(to right, #00965e 0%, #007c89 40%, #2e519b 75%, #3d5ba9 100%);
            height: 48px;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        .top-gradient-bar .right-logo { height: 30px; width: auto; }
        .top-gradient-bar .right-logo img { height: 100%; width: auto; object-fit: contain; }

        /* আপনার দেওয়া স্ক্রিনশট অনুযায়ী টুলবারের হুবহু ডিজাইন */
        .custom-pdf-toolbar {
            background-color: #f1f3f4;
            height: 44px;
            width: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 6px; /* বাটনগুলোর মাঝের স্পেস */
            padding: 0 10px;
            border-bottom: 1px solid #dadce0;
            flex-shrink: 0;
            z-index: 100;
        }

        /* কমন বাটন স্টাইলিং (সাদা বক্স) */
        .toolbar-btn {
            background: #ffffff;
            border: 1px solid #dcdcdc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* চারকোণা বাটন (Shape ১) */
        .shape-rect {
            width: 34px;
            height: 34px;
            border-radius: 6px;
        }

        /* গোল বাটন (Shape ২) */
        .shape-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
        }

        /* বড় চারকোণা পেজ কাউন্টার বাটন */
        .shape-big-rect {
            padding: 0 12px;
            height: 34px;
            border-radius: 6px;
            font-size: 14px;
            color: #1c1b1f;
            font-weight: 500;
        }

        /* কালো আইকন স্টাইলিং */
        .toolbar-btn svg {
            width: 18px;
            height: 18px;
            fill: #1c1b1f;
        }

        .toolbar-btn:active { background: #e8eaed; transform: scale(0.92); }

        /* পিডিএফ ভিউয়ার এলাকা */
        .pdf-viewer-container {
            flex: 1;
            width: 100%;
            background: #525659;
            position: relative;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        #pdfIframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        /* ডার্ক মোড ইনভার্স ইফেক্ট */
        .dark-active #pdfIframe {
            filter: invert(0.9) hue-rotate(180deg);
        }

        /* ৪. এরর মেসেজ বক্স */
        .error-box {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 380px;
            width: 85%;
            display: none;
            border-top: 6px solid #ef5350;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
        }
        .error-icon { color: #ef5350; font-size: 40px; margin-bottom: 12px; }
        .error-title { color: #d32f2f; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .error-desc { color: #666; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="loadingSection">
        <div class="logo-wrapper">
            <div class="circle-pulse"></div>
            <div class="circle-pulse-delayed"></div>
            <img src="logo.png" alt="Chamber Logo">
        </div>
    </div>

    <div id="interstitialPopup">
        <div class="wait-box">
            <div class="blue-spinner"></div>
            <div class="wait-text">Please wait Loading...</div>
        </div>
    </div>

    <div id="mainPortal">
        <div class="top-gradient-bar">
            <div class="right-logo">
                <img src="header-logo.png" alt="Chamber Right Logo">
            </div>
        </div>

        <div class="custom-pdf-toolbar">
            <button class="toolbar-btn shape-rect" title="Sidebar">
                <svg viewBox="0 0 24 24"><path d="M4 18h16v-2H4v2zm0-5h16v-2H4v2zm0-7v2h16V6H4z"/></svg>
            </button>
            
            <button class="toolbar-btn shape-rect" onclick="zoomOut()" title="Previous Page">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>

            <div class="toolbar-btn shape-big-rect" title="Page Count">1/1</div>

            <button class="toolbar-btn shape-rect" onclick="zoomIn()" title="Next Page">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
            
            <button class="toolbar-btn shape-circle" id="downloadBtn" title="Download">
                <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm14-9h-4V3H9v8H5l7 7 7-7z"/></svg>
            </button>
            
            <button class="toolbar-btn shape-circle" onclick="zoomOut()" title="Zoom Out">
                <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
            </button>
            
            <button class="toolbar-btn shape-circle" onclick="zoomIn()" title="Zoom In">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
            
            <button class="toolbar-btn shape-circle" title="Fit to Page">
                <svg viewBox="0 0 24 24"><path d="M7 19h10v2H7v-2zm10-14H7V3h10v2zm0 2h-2v10h2V7zm-8 10h-2V7h2v10z"/></svg>
            </button>

            <button class="toolbar-btn shape-circle" onclick="rotatePDF(false)" title="Rotate Left">
                <svg viewBox="0 0 24 24"><path d="M7.11 8.53L5.7 7.11C4.8 8.27 4.24 9.61 4.07 11h2.02c.16-.84.52-1.61 1.02-2.47zm1.01-1.02c.86-.5 1.63-.86 2.47-1.02V4.47c-1.39.17-2.73.73-3.89 1.63l1.42 1.41zM13 4.07v2.02c.84.16 1.61.52 2.47 1.02l1.41-1.42C15.73 4.8 14.39 4.24 13 4.07zm6.93 6.93h2.02c-.17-1.39-.73-2.73-1.63-3.89l-1.41 1.42c.5.86.86 1.63 1.02 2.47z"/></svg>
            </button>

            <button class="toolbar-btn shape-circle" onclick="rotatePDF(true)" title="Rotate Right">
                <svg viewBox="0 0 24 24"><path d="M15.55 13c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2h7.45zM6.16 6h12.15l-2.76 5H8.53L6.16 6zM7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </button>

            <button class="toolbar-btn shape-circle" onclick="toggleDarkMode()" title="Dark Mode">
                <svg viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>
            </button>
        </div>

        <div class="pdf-viewer-container" id="pdfContainer">
            <iframe id="pdfIframe" src=""></iframe>
        </div>
    </div>

    <div id="errorSection" class="error-box">
        <div class="error-icon">❌</div>
        <div id="errorTitle" class="error-title">Document Not Found</div>
        <div id="errorDesc" class="error-desc">The requested file does not exist in records.</div>
    </div>

<script>
    const SECRET_KEY = "ChamberOfficialSecretKey#2026";
    let currentZoom = 1;
    let currentRotation = 0;
    let globalPdfUrl = "";

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function showError(title, desc) {
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('interstitialPopup').style.display = 'none';
        document.getElementById('mainPortal').style.display = 'none';
        document.getElementById('errorSection').style.display = 'block';
        document.getElementById('errorTitle').innerText = title;
        document.getElementById('errorDesc').innerText = desc;
    }

    function zoomIn() {
        if (currentZoom < 2.6) {
            currentZoom += 0.2;
            applyTransforms();
        }
    }

    function zoomOut() {
        if (currentZoom > 0.6) {
            currentZoom -= 0.2;
            applyTransforms();
        }
    }

    function rotatePDF(isClockwise) {
        currentRotation = isClockwise ? (currentRotation + 90) % 360 : (currentRotation - 90) % 360;
        applyTransforms();
    }

    function applyTransforms() {
        const iframe = document.getElementById('pdfIframe');
        iframe.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
    }

    function toggleDarkMode() {
        const container = document.getElementById('pdfContainer');
        container.classList.toggle('dark-active');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const encryptedId = getQueryParam('id');

        if (!encryptedId) {
            showError("Document Not Found", "The requested file does not exist in records.");
            return;
        }

        try {
            const formattedToken = encryptedId.replace(/ /g, '+');
            const bytes = CryptoJS.AES.decrypt(formattedToken, SECRET_KEY);
            const decryptedData = bytes.toString(CryptoJS.enc.Utf8);

            if (!decryptedData) {
                showError("Verification Failed", "Tampered or Expired Token.");
                return;
            }

            let decryptedRealId = "";
            if (decryptedData.includes('|')) {
                decryptedRealId = decryptedData.split('|')[1];
            } else {
                decryptedRealId = decryptedData;
            }

            globalPdfUrl = `pdfs/${decryptedRealId}.pdf`;

            fetch(globalPdfUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        const encodedAbsoluteUrl = encodeURIComponent(window.location.origin + window.location.pathname.replace('index.html', '') + globalPdfUrl);
                        const viewerUrl = `https://docs.google.com/gview?url=${encodedAbsoluteUrl}&embedded=true`;
                        
                        const iframe = document.getElementById('pdfIframe');
                        iframe.src = viewerUrl;

                        document.getElementById('downloadBtn').onclick = function() {
                            const link = document.createElement('a');
                            link.href = globalPdfUrl;
                            link.download = `${decryptedRealId}.pdf`;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        };

                        setTimeout(() => {
                            document.getElementById('loadingSection').style.display = 'none';
                            document.getElementById('interstitialPopup').style.display = 'flex';

                            setTimeout(() => {
                                document.getElementById('interstitialPopup').style.display = 'none';
                                document.getElementById('mainPortal').style.display = 'flex';
                            }, 750); 

                        }, 1800);
                    } else {
                        showError("Document Not Found", "The requested file does not exist in records.");
                    }
                })
                .catch(error => {
                    showError("System Error", "Unable to complete verification portal request.");
                });

        } catch (e) {
            showError("Error", "Invalid Security Encryption Format.");
        }
    });
</script>

</body>
</html>
