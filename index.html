<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Files Portal - Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #ffffff; max-width: 600px; width: 100%; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); overflow: hidden; text-align: center; border-top: 5px solid #004d40; }
        .header { padding: 25px; background: #ffffff; border-bottom: 1px solid #eee; }
        .header h1 { font-size: 22px; color: #004d40; }
        .header p { font-size: 13px; color: #666; margin-top: 5px; }
        .content { padding: 40px 20px; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .status-message { font-size: 16px; font-weight: 600; margin-bottom: 25px; padding: 12px 20px; border-radius: 4px; width: 100%; }
        .loading { color: #004d40; background: #e0f2f1; }
        .error { color: #c62828; background: #ffebee; }
        .success { color: #2e7d32; background: #e8f5e9; }
        
        .action-btn { 
            display: none; 
            background: #004d40; 
            color: white; 
            text-decoration: none; 
            padding: 14px 30px; 
            border-radius: 4px; 
            font-weight: bold; 
            box-shadow: 0 2px 8px rgba(0,77,64,0.3);
            transition: 0.2s;
            font-size: 16px;
        }
        .action-btn:hover { background: #00332c; }
        .footer { padding: 15px; background: #f8f9fa; font-size: 11px; color: #757575; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>الـغـرفـة الـتـجـاريـة - بـوابـة الـمـلـفـات</h1>
        <p>Chamber of Commerce - Official Files Portal</p>
    </div>

    <div class="content">
        <div id="status" class="status-message loading">🔄 Securing Connection & Verifying Document Token...</div>
        
        <a id="viewBtn" href="#" class="action-btn" target="_blank">📄 View Official Document (PDF)</a>
    </div>

    <div class="footer">
        &copy; 2026 Chamber of Commerce. All rights reserved. Secure Verification Portal.
    </div>
</div>

<script>
    const SECRET_KEY = "ChamberOfficialSecretKey#2026";

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    window.addEventListener('DOMContentLoaded', () => {
        const encryptedId = getQueryParam('id');
        const statusElement = document.getElementById('status');
        const viewBtn = document.getElementById('viewBtn');

        if (!encryptedId) {
            statusElement.innerHTML = "❌ Error 403: Invalid Access Token or Bad Request.";
            statusElement.className = "status-message error";
            return;
        }

        try {
            const formattedToken = encryptedId.replace(/ /g, '+');
            const bytes = CryptoJS.AES.decrypt(formattedToken, SECRET_KEY);
            const decryptedRealId = bytes.toString(CryptoJS.enc.Utf8);

            if (!decryptedRealId) {
                statusElement.innerHTML = "❌ Verification Failed: Tampered or Expired Token.";
                statusElement.className = "status-message error";
                return;
            }

            // যেহেতু pdfs ফোল্ডারটি files-portal এর ভেতরেই আছে
            const pdfUrl = `pdfs/${decryptedRealId}.pdf`;

            fetch(pdfUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        statusElement.innerHTML = "✅ Document Successfully Verified by Chamber Portal.";
                        statusElement.className = "status-message success";
                        
                        // বাটন সেটআপ এবং সরাসরি ব্রাউজারের অফিসিয়াল ভিউয়ারে ওপেন করার লিংক
                        viewBtn.href = pdfUrl;
                        viewBtn.style.display = "inline-block";
                    } else {
                        statusElement.innerHTML = "❌ Document Not Found: The requested file does not exist in records.";
                        statusElement.className = "status-message error";
                    }
                })
                .catch(error => {
                    statusElement.innerHTML = "❌ System Error: Unable to complete verification.";
                    statusElement.className = "status-message error";
                });

        } catch (e) {
            statusElement.innerHTML = "❌ Error: Invalid Security Encryption Format.";
            statusElement.className = "status-message error";
        }
    });
</script>

</body>
</html>
